<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Alisha Zehra</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="contact.css">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">
      <div class="logo-circle">A</div>
      <span class="logo-text">Alisha Zehra</span>
    </div>
    <button class="hamburger" id="hamburger">&#9776;</button>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="portfolio.html">Projects</a></li>
      <li><a href="contact.html" class="active-link">Contact</a></li>
    </ul>
  </header>

  <!-- CONTACT HERO -->
  <section class="contact-hero">
    <h1>Contact <span class="gradient-text">Me</span></h1>
    <p>Have a project in mind or just want to say hello? I'd love to hear from you!</p>
  </section>

  <!-- CONTACT CONTENT -->
  <section class="contact-section">
    <div class="contact-wrapper">

      <!-- LEFT: Info Cards -->
      <div class="contact-info">
        <div class="info-card">
          <div class="info-icon">📧</div>
          <div>
            <h4>Email</h4>
            <p>alishazehra992@example.com</p>
          </div>
        </div>
        
        <div class="info-card">
          <div class="info-icon">🟢</div>
          <div>
            <h4>Availability</h4>
            <p>Open for freelance projects</p>
          </div>
        </div>

        <!-- Social Links -->
       
      </div>

      <!-- RIGHT: Contact Form -->
      <div class="contact-form-container">
        <form id="contactForm" class="contact-form">
          <div class="form-row">
            <div class="form-group">
              <label for="name">Full Name</label>
              <input type="text" id="name" placeholder="Alisha Zehra" required>
            </div>
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" placeholder="alisha@example.com" required>
            </div>
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" placeholder="Project Inquiry" required>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" rows="6" placeholder="Tell me about your project..." required></textarea>
          </div>
          <button type="submit" class="submit-btn">
            <span class="btn-text">Send Message</span>
            <span class="btn-icon">🚀</span>
          </button>
          <div id="formStatus" class="form-status"></div>
        </form>
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer class="contact-footer">
    <p>&copy; 2026 Alisha Zehra. All rights reserved.</p>
  </footer>

  <script>
    // Hamburger menu
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('nav-links');
    hamburger.addEventListener('click', () => {
      navLinks.classList.toggle('show');
    });

    // Contact form submission
    const form = document.getElementById('contactForm');
    const formStatus = document.getElementById('formStatus');

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();

      if (!name || !email || !message) {
        formStatus.textContent = '⚠️ Please fill in all required fields.';
        formStatus.className = 'form-status error';
        return;
      }

      const btn = form.querySelector('.submit-btn');
      const btnText = btn.querySelector('.btn-text');
      const originalText = btnText.textContent;
      btn.disabled = true;
      btnText.textContent = 'Sending...';

      // Send data to Formspree (replace URL with your endpoint)
      fetch('https://formspree.io/f/mvzwvkne', {
        method: 'POST',
        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, message })
      })
        .then(response => {
          if (response.ok) {
            formStatus.textContent = '✅ Message sent successfully! I\'ll get back to you soon.';
            formStatus.className = 'form-status success';
            form.reset();
          } else {
            formStatus.textContent = '❌ Something went wrong. Please try again.';
            formStatus.className = 'form-status error';
          }
        })
        .catch(() => {
          formStatus.textContent = '❌ Network error. Please try again later.';
          formStatus.className = 'form-status error';
        })
        .finally(() => {
          btn.disabled = false;
          btnText.textContent = originalText;

          setTimeout(() => {
            formStatus.textContent = '';
            formStatus.className = 'form-status';
          }, 5000);
        });
    });
  </script>
</body>
</html>
